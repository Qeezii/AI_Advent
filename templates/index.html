<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YandexGPT Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 900px;
        }
        .chat-header {
            padding: 20px;
            background: #667eea;
            color: white;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }
        .chat-header h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .chat-header p { opacity: 0.9; font-size: 0.9rem; }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #f1f3f6;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        
        .chat-input {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            background: #fafafa;
            border-radius: 0 0 16px 16px;
        }
        .chat-input textarea {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            max-height: 120px;
            font-family: inherit;
        }
        .chat-input textarea:focus { border-color: #667eea; }
        .chat-input button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .chat-input button:hover { background: #5568d3; }
        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #f1f3f6;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: #666;
            font-style: italic;
        }
        .typing-indicator.active { display: block; }
        
        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 YandexGPT Chat</h1>
        </div>
        
        <div class="chat-messages" id="messages">
            <div class="message assistant">
                Привет! Чем могу помочь?
            </div>
        </div>
        
        <div class="typing-indicator" id="typing">
            🤔 Думаю...
        </div>
        
        <form class="chat-input" id="chat-form">
            <textarea 
                id="user-input" 
                placeholder="Напишите сообщение..." 
                rows="1"
                required
            ></textarea>
            <button type="submit" id="send-btn">Отправить</button>
        </form>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingEl = document.getElementById('typing');

        // Авто-высота textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Отправка по Ctrl+Enter
        input.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                form.requestSubmit();
            }
        });

        // Обработка отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = input.value.trim();
            if (!message) return;
            
            // Добавляем сообщение пользователя
            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            // Блокируем интерфейс
            setLoading(true);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        temperature: 0.3,
                        max_tokens: 1000
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Ошибка сервера');
                }
                
                // Добавляем ответ ассистента
                addMessage(data.response, 'assistant');
                
            } catch (error) {
                console.error('Ошибка:', error);
                addMessage(`❌ ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        });

        function addMessage(text, role) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;
            msgEl.textContent = text;
            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            input.disabled = loading;
            typingEl.classList.toggle('active', loading);
            if (!loading) input.focus();
        }

        // Фокус на поле ввода при загрузке
        window.addEventListener('load', () => input.focus());
    </script>
</body>
</html>
